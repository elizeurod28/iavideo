<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 IA Geradora de Vídeos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0d12 0%, #1a1f2b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 1.5rem;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(22, 28, 40, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 1.2rem;
        }

        .header i {
            font-size: 2.2rem;
            color: #c084fc;
        }

        .header h1 {
            font-weight: 600;
            font-size: 1.8rem;
            background: linear-gradient(to right, #f0f4ff, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            margin-left: auto;
            background: rgba(192, 132, 252, 0.15);
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-size: 0.7rem;
            color: #c4b5fd;
            border: 1px solid rgba(192, 132, 252, 0.2);
        }

        .upload-zone {
            background: rgba(12, 16, 24, 0.6);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 2px dashed rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-zone:hover {
            border-color: rgba(192, 132, 252, 0.3);
            background: rgba(192, 132, 252, 0.05);
        }

        .upload-label {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            cursor: pointer;
        }

        .upload-label i {
            font-size: 2.2rem;
            color: #8b7bb8;
        }

        .upload-label span {
            color: #d4d9e8;
            font-size: 0.95rem;
        }

        .upload-label .file-name {
            color: #c084fc;
            background: rgba(192, 132, 252, 0.08);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(192, 132, 252, 0.15);
        }

        #file-input {
            display: none;
        }

        .preview-container {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
        }

        #image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 20px;
            display: none;
            object-fit: contain;
            background: #0b0d12;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prompt-area {
            margin: 1.5rem 0;
        }

        .prompt-area label {
            display: block;
            color: #b9c2db;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .prompt-area textarea {
            width: 100%;
            background: rgba(8, 11, 18, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: #f0f4ff;
            resize: vertical;
            min-height: 100px;
            transition: border 0.2s;
        }

        .prompt-area textarea:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
        }

        .api-key-area {
            margin: 1rem 0;
        }

        .api-key-area label {
            display: block;
            color: #b9c2db;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .api-key-area input {
            width: 100%;
            background: rgba(8, 11, 18, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 1.5rem;
            padding: 0.8rem 1.5rem;
            font-size: 0.95rem;
            color: #f0f4ff;
            transition: border 0.2s;
        }

        .api-key-area input:focus {
            outline: none;
            border-color: #a78bfa;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #7c5cfc, #a78bfa);
            border: none;
            padding: 1.2rem;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(124, 92, 252, 0.3);
        }

        .generate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 30px rgba(124, 92, 252, 0.5);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-area {
            margin-top: 1.5rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            min-height: 70px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-icon {
            font-size: 1.8rem;
            color: #a78bfa;
            min-width: 2.5rem;
        }

        #status-message {
            color: #d4ddf5;
            font-size: 0.95rem;
            line-height: 1.5;
            flex: 1;
        }

        .video-container {
            margin-top: 1.5rem;
            display: none;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #000;
        }

        .video-container video {
            width: 100%;
            display: block;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .disclaimer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #5f6885;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 1.5rem;
        }

        .warning {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            margin-top: 1rem;
            color: #fbbf24;
            font-size: 0.85rem;
        }

        .warning a {
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <i class="fas fa-film"></i>
            <h1>VideoForge · IA</h1>
            <span class="badge"><i class="fas fa-video"></i> Stable Diffusion</span>
        </div>

        <div class="upload-zone" id="uploadZone">
            <label for="file-input" class="upload-label">
                <i class="fas fa-cloud-upload-alt"></i>
                <span><strong>Foto base</strong> · clique ou arraste</span>
                <span class="file-name" id="fileName">nenhuma imagem</span>
            </label>
            <input type="file" id="file-input" accept="image/*">
            <div class="preview-container">
                <img id="image-preview" alt="pré-visualização">
            </div>
        </div>

        <div class="api-key-area">
            <label><i class="fas fa-key" style="margin-right: 8px;"></i>Sua chave da API Replicate</label>
            <input type="password" id="apiKey" value="r8_VK7KtjWiuz8XbxlBzciKowQCfJOSyvp4068Qu" readonly style="background:rgba(192,132,252,0.05); border-color:rgba(192,132,252,0.2); color:#a78bfa;">
        </div>

        <div class="prompt-area">
            <label><i class="fas fa-pen-fancy" style="margin-right: 8px;"></i>Prompt do vídeo</label>
            <textarea id="promptInput" placeholder="Descreva como o vídeo deve ser...">vídeo em câmera lenta, estilo cinematográfico, cores vibrantes, movimento suave</textarea>
        </div>

        <button class="generate-btn" id="generateBtn">
            <i class="fas fa-play"></i> Gerar Vídeo com IA
        </button>

        <div class="status-area">
            <div class="status-icon" id="statusIcon">
                <i class="fas fa-circle-info"></i>
            </div>
            <div id="statusMessage">Aguardando imagem e prompt...</div>
        </div>

        <div class="video-container" id="videoContainer">
            <video id="generatedVideo" controls autoplay loop></video>
        </div>

        <div class="warning">
            <i class="fas fa-info-circle"></i> 
            <strong>Nova versão!</strong> A imagem é enviada para um servidor e depois para a IA. Mais estável!
        </div>

        <div class="disclaimer">
            <i class="fas fa-robot"></i> Usa o modelo Stable Video Diffusion · vídeos reais com IA
        </div>
    </div>

    <script>
        (function() {
            const fileInput = document.getElementById('file-input');
            const fileNameSpan = document.getElementById('fileName');
            const imagePreview = document.getElementById('image-preview');
            const uploadZone = document.getElementById('uploadZone');
            const promptInput = document.getElementById('promptInput');
            const apiKeyInput = document.getElementById('apiKey');
            const generateBtn = document.getElementById('generateBtn');
            const statusIcon = document.getElementById('statusIcon');
            const statusMessage = document.getElementById('statusMessage');
            const videoContainer = document.getElementById('videoContainer');
            const generatedVideo = document.getElementById('generatedVideo');

            let currentImageFile = null;
            let imageDataUrl = null;
            let imageUrl = null;

            // Upload
            function handleFile(file) {
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    setStatus('⚠️', 'Por favor, selecione uma imagem (JPG, PNG, etc)', '#fbbf24');
                    return;
                }

                currentImageFile = file;
                fileNameSpan.textContent = file.name.length > 30 ? file.name.slice(0, 27) + '…' : file.name;

                const reader = new FileReader();
                reader.onload = (e) => {
                    imageDataUrl = e.target.result;
                    imagePreview.src = imageDataUrl;
                    imagePreview.style.display = 'block';
                    setStatus('✅', 'Imagem carregada! Agora gere o vídeo.', '#86efac');
                };
                reader.readAsDataURL(file);
            }

            fileInput.addEventListener('change', (e) => {
                if (fileInput.files && fileInput.files.length > 0) {
                    handleFile(fileInput.files[0]);
                }
            });

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = '#a78bfa';
            });

            uploadZone.addEventListener('dragleave', () => {
                uploadZone.style.borderColor = 'rgba(255,255,255,0.08)';
            });

            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = 'rgba(255,255,255,0.08)';
                const files = e.dataTransfer.files;
                if (files && files.length > 0) {
                    handleFile(files[0]);
                    fileInput.files = files;
                }
            });

            uploadZone.addEventListener('click', () => fileInput.click());

            function setStatus(icon, message, color = '#c4b5fd') {
                statusIcon.innerHTML = `<i class="fas ${icon}" style="color:${color};"></i>`;
                statusMessage.textContent = message;
            }

            // Função para redimensionar a imagem
            function resizeImage(dataUrl, maxWidth = 512, maxHeight = 512) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = function() {
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = (width * maxHeight) / height;
                            height = maxHeight;
                        }
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                    img.src = dataUrl;
                });
            }

            // Função para fazer upload da imagem para o ImgBB
            async function uploadToImgBB(base64Image) {
                const formData = new FormData();
                formData.append('image', base64Image);
                formData.append('key', '5d192b065c7744468737d764d884d33d'); // Chave pública do ImgBB

                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Falha ao fazer upload da imagem');
                }

                const data = await response.json();
                return data.data.url;
            }

            // Função principal para gerar vídeo
            async function generateVideo() {
                if (!currentImageFile) {
                    setStatus('⚠️', 'Por favor, selecione uma foto primeiro.', '#fbbf24');
                    return;
                }

                const prompt = promptInput.value.trim();
                if (!prompt) {
                    setStatus('✏️', 'Escreva um prompt para o vídeo.', '#fbbf24');
                    return;
                }

                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) {
                    setStatus('🔑', 'Insira sua chave da API Replicate', '#fbbf24');
                    return;
                }

                generateBtn.disabled = true;
                generateBtn.innerHTML = '<span class="loader"></span> Processando... (1-2 min)';

                videoContainer.style.display = 'none';
                generatedVideo.src = '';

                try {
                    // Passo 1: Redimensionar a imagem
                    setStatus('⏳', '📸 Preparando imagem...', '#a78bfa');
                    const resizedImage = await resizeImage(imageDataUrl, 512, 512);
                    
                    // Passo 2: Fazer upload para o ImgBB
                    setStatus('⏳', '📤 Enviando imagem para servidor...', '#a78bfa');
                    imageUrl = await uploadToImgBB(resizedImage);
                    setStatus('✅', '📸 Imagem enviada com sucesso!', '#86efac');

                    // Passo 3: Enviar para a Replicate
                    setStatus('⏳', '🤖 Enviando para IA...', '#a78bfa');

                    const response = await fetch('https://api.replicate.com/v1/predictions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Token ${apiKey}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            version: "3f0450e77b947e5e12b3e6608dee1f5201d1fde2f56c9c9c08a43c80cd5b9f77",
                            input: {
                                input_image: imageUrl, // Usando URL em vez de base64
                                prompt: prompt,
                                video_length: "25_frames",
                                fps: 7,
                                width: 576,
                                height: 320,
                                num_frames: 25,
                                decode_chunk_size: 2,
                                motion_bucket_id: 127,
                                cond_aug: 0.02,
                                seed: Math.floor(Math.random() * 1000000),
                            }
                        })
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Erro na API: ${response.status} - ${errorText}`);
                    }

                    const prediction = await response.json();
                    const predictionId = prediction.id;

                    setStatus('⏳', '🎬 Gerando vídeo... (até 60s)', '#a78bfa');

                    let status = 'processing';
                    let videoUrl = null;
                    let attempts = 0;
                    const maxAttempts = 60;

                    while ((status === 'processing' || status === 'starting') && attempts < maxAttempts) {
                        await new Promise(resolve => setTimeout(resolve, 2000));
                        attempts++;

                        const statusResponse = await fetch(`https://api.replicate.com/v1/predictions/${predictionId}`, {
                            headers: {
                                'Authorization': `Token ${apiKey}`,
                            }
                        });

                        if (!statusResponse.ok) continue;

                        const statusData = await statusResponse.json();
                        status = statusData.status;

                        if (status === 'succeeded') {
                            videoUrl = statusData.output;
                            break;
                        } else if (status === 'failed') {
                            throw new Error('Falha na geração do vídeo.');
                        }
                    }

                    if (videoUrl) {
                        generatedVideo.src = videoUrl;
                        videoContainer.style.display = 'block';
                        setStatus('🎬', '✅ Vídeo gerado com sucesso!', '#86efac');
                    } else {
                        throw new Error('Tempo limite excedido.');
                    }

                } catch (error) {
                    console.error('Erro:', error);
                    setStatus('❌', `Erro: ${error.message}`, '#f87171');
                } finally {
                    generateBtn.disabled = false;
                    generateBtn.innerHTML = '<i class="fas fa-play"></i> Gerar Vídeo com IA';
                }
            }

            generateBtn.addEventListener('click', generateVideo);
            setStatus('📌', 'Carregue uma imagem, insira o prompt e clique em gerar.', '#8b9bb5');
        })();
    </script>
</body>
</html>
